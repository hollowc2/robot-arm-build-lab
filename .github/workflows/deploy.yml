name: Deploy Robot Arm Site

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run rsync in dry-run mode"
        type: boolean
        default: true
  push:
    branches: [main]

concurrency:
  group: robot-arm-production
  cancel-in-progress: false

jobs:
  build:
    name: Build Deployable Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install CAD dependencies
        run: uv sync

      - name: Generate public metadata
        run: |
          uv run python scripts/generate_catalog.py
          uv run python scripts/generate_progress_feed.py
          uv run python scripts/export_models.py
          uv run python scripts/publish_web_models.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install site dependencies
        working-directory: site
        run: npm install

      - name: Build static site
        working-directory: site
        run: npm run build

      - name: Upload deploy bundle
        uses: actions/upload-artifact@v4
        with:
          name: robot-arm-site-dist
          path: site/dist/
          if-no-files-found: error

  deploy:
    name: Deploy to Helios
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Download deploy bundle
        uses: actions/download-artifact@v4
        with:
          name: robot-arm-site-dist
          path: site-dist/

      - name: Validate deployment secrets
        run: |
          missing=()
          [ -n "$HELIOS_HOST" ] || missing+=("HELIOS_HOST")
          [ -n "$HELIOS_USER" ] || missing+=("HELIOS_USER")
          [ -n "$HELIOS_SSH_KEY" ] || missing+=("HELIOS_SSH_KEY")
          [ -n "$TS_AUTHKEY" ] || missing+=("TS_AUTHKEY")

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required production secret(s): %s\n' "${missing[*]}" >&2
            printf 'Add them to the production GitHub Environment before rerunning deploy.\n' >&2
            exit 1
          fi
        env:
          HELIOS_HOST: ${{ secrets.HELIOS_HOST }}
          HELIOS_USER: ${{ secrets.HELIOS_USER }}
          HELIOS_SSH_KEY: ${{ secrets.HELIOS_SSH_KEY }}
          TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          ping: ${{ secrets.HELIOS_HOST }}

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$HELIOS_SSH_KEY" > ~/.ssh/helios
          chmod 600 ~/.ssh/helios
          ssh-keyscan -H "$HELIOS_HOST" >> ~/.ssh/known_hosts
        env:
          HELIOS_HOST: ${{ secrets.HELIOS_HOST }}
          HELIOS_SSH_KEY: ${{ secrets.HELIOS_SSH_KEY }}

      - name: Sync static files
        run: |
          RSYNC_FLAGS="-avz --delete"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            RSYNC_FLAGS="$RSYNC_FLAGS --dry-run"
          fi
          rsync $RSYNC_FLAGS -e "ssh -i ~/.ssh/helios" site-dist/ "$HELIOS_USER@$HELIOS_HOST:/var/www/billybitcoin.cloud/html/robot-arm/"
        env:
          HELIOS_HOST: ${{ secrets.HELIOS_HOST }}
          HELIOS_USER: ${{ secrets.HELIOS_USER }}
