name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  cad:
    name: CAD and Generated Metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install CAD dependencies
        run: uv sync

      - name: Run CAD tests
        run: uv run pytest

      - name: Generate public metadata
        run: |
          uv run python scripts/generate_catalog.py
          uv run python scripts/generate_progress_feed.py

      - name: Export CAD artifacts
        run: |
          uv run python scripts/export_models.py
          uv run python scripts/publish_web_models.py

      - name: Upload CAD exports
        uses: actions/upload-artifact@v4
        with:
          name: robot-arm-cad-exports
          path: models/out/
          if-no-files-found: error

      - name: Upload generated web assets
        uses: actions/upload-artifact@v4
        with:
          name: robot-arm-generated-web-assets
          path: site/public/generated/
          if-no-files-found: error

  site:
    name: Site Build and Smoke Test
    runs-on: ubuntu-latest
    needs: cad
    steps:
      - uses: actions/checkout@v4

      - name: Download generated web assets
        uses: actions/download-artifact@v4
        with:
          name: robot-arm-generated-web-assets
          path: site/public/generated/

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install site dependencies
        working-directory: site
        run: npm install

      - name: Install Playwright browser
        working-directory: site
        run: npx playwright install --with-deps chromium

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Smoke test site
        working-directory: site
        run: npm run smoke

      - name: Upload static site
        uses: actions/upload-artifact@v4
        with:
          name: robot-arm-site-dist
          path: site/dist/
          if-no-files-found: error
